<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Taller-4 - Recuperar Contraseña</title>
  <meta name="description" content="Página recover del taller 4 de desarrollo web con Bootstrap y toda la información sobre la UEFA Champions League" />
  <meta name="keywords" content="Taller 4 bootstrap, UEFA Champions League, UCL" />
  
  <meta name="author" content="Sebastian Monsalve" />
  <link rel="shortcut icon" href="../assets/img/champions_blanco.png" type="image/png" />
  
  <meta name="theme-color" content="#1f4ea8" />
  <meta name="MobileOptimized" content="width" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column opacity-20 " style="background-image: url(../assets/img/balloon-.jpg); background-size: cover;background-position: center; background-repeat: no-repeat;">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
         <div class="navbar-brand d-flex align-items-center m-0 p-0">
            <img
              src="../assets/img/champions_blanco.png"
              alt="Logo UCL"
              width="30"
              height="30"
              class="me-2"
            />
            <span class="fs-5 fw-bold text-light font-monospace">UCL</span>
            </div>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Volver al login
        </a>
      </div>
    </div>
  </nav>

  <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-6 col-lg-5 col-xl-4">

          <div class="card">
            <div class="card-body p-4">

              <div class="text-center mb-4">
                 <img src="../assets/img/Champions_negro.png" alt="Logo UCL" width="30" height="30" class="me-2" />
                <h3 class="mt-2">Recuperar Contraseña</h3>
                <p class="text-muted">Ingresa tu correo y te mandamos un enlace de recuperacion</p>
              </div>

              <!-- ejemplo is-invalid para mostrar error correo no encontrado -->
              <div class="mb-3">
                <div class="form-floating">
                  <input type="email" class="form-control is-invalid" id="correoMalo"
                    placeholder="correo@club.com" value="madrid@correoerrado.com" />
                  <label for="correoMalo">Correo electronico</label>
                  <div class="invalid-feedback">
                    <i class="bi bi-x-circle me-1"></i>Correo no encontrado en el sistema.
                  </div>
                </div>
              </div>

              <!-- ejemplo is-valid para mostrar correo encontrado -->
              <div class="mb-3">
                <div class="form-floating">
                  <input type="email" class="form-control is-valid" id="correobueno"
                    placeholder="correo@club.com" value="admin@realmadrid.com" />
                  <label for="correobueno">Correo electronico (ejemplo valido)</label>
                  <div class="valid-feedback">
                    <i class="bi bi-check-circle me-1"></i>Club encontrado! Revisa tu correo.
                  </div>
                </div>
              </div>

              <button class="btn btn-primary w-100 btn-lg mb-3">
                <i class="bi bi-send-fill me-2"></i>Enviar enlace
              </button>

              <div class="text-center">
                <a href="login.html" class="text-decoration-none small">
                  <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesion
                </a>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-3 bg-dark text-light small">
    &copy;  UEFA Champions League
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
