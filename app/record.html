<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Taller-4 - Registro</title>
  <meta name="description" content="Página record del taller 4 de desarrollo web con Bootstrap y toda la información sobre la UEFA Champions League" />
  <meta name="keywords" content="Taller 4 bootstrap, UEFA Champions League, UCL" />
  
  <meta name="author" content="Sebastian Monsalve" />
  <link rel="shortcut icon" href="../assets/img/champions_blanco.png" type="image/png" />
  
  <meta name="theme-color" content="#1f4ea8" />
  <meta name="MobileOptimized" content="width" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column opacity-20 " style="background-image: url(../assets/img/balloon-.jpg); background-size: cover;background-position: center; background-repeat: no-repeat;">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
         <div class="navbar-brand d-flex align-items-center m-0 p-0">
            <img
              src="../assets/img/champions_blanco.png"
              alt="Logo UCL"
              width="30"
              height="30"
              class="me-2"
            />
            <span class="fs-5 fw-bold text-light font-monospace">UCL</span>
            </div>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Volver al login
        </a>
      </div>
    </div>
  </nav>

  <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-8 col-xl-6">

          <div class="card shadow">
            <div class="card-body p-4">

              <div class="text-center mb-4">
                <img src="../assets/img/Champions_negro.png" alt="UCL" style="height: 70px;" />
                <h3 class="mt-3">Registrar Club</h3>
                <p class="text-muted">Inscribe tu club en la UCL</p>
              </div>

              <!-- nombre y apellidos en una fila -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" class="form-control" id="nombre" placeholder="Nombre" />
                    <label for="nombre">Nombre del representante</label>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" />
                    <label for="apellidos">Apellidos</label>
                  </div>
                </div>
              </div>

              <!-- correo y telefono en una fila -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="email" class="form-control" id="correo" placeholder="correo@club.com" />
                    <label for="correo">Correo electronico</label>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="tel" class="form-control" id="telefono" placeholder="+34 600 000 000" />
                    <label for="telefono">Telefono</label>
                  </div>
                </div>
              </div>

              <!-- nombre del club y pais -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="text" class="form-control" id="nombreClub" placeholder="Nombre del club" />
                    <label for="nombreClub">Nombre del club</label>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-floating">
                    <select class="form-select" id="liga">
                      <option value="" disabled selected>Selecciona...</option>
                      <option>La Liga (España)</option>
                      <option>Premier League (Inglaterra)</option>
                      <option>Bundesliga (Alemania)</option>
                      <option>Serie A (Italia)</option>
                      <option>Ligue 1 (Francia)</option>
                      <option>Otra liga</option>
                    </select>
                    <label for="liga">Liga de origen</label>
                  </div>
                </div>
              </div>

              <!-- contraseñas -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="password" class="form-control" id="pass1" placeholder="Contraseña" />
                    <label for="pass1">Contraseña</label>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-floating">
                    <input type="password" class="form-control" id="pass2" placeholder="Confirmar contraseña" />
                    <label for="pass2">Confirmar contraseña</label>
                  </div>
                </div>
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terminos" />
                <label class="form-check-label" for="terminos">
                  Acepto el <a href="#">reglamento UEFA</a> y las condiciones de participacion
                </label>
              </div>

              <button class="btn btn-success w-100 btn-lg mb-3">
                <i class="bi bi-check-circle-fill me-2"></i>Registrar Club
              </button>

              <div class="text-center">
                <p class="small mb-0">Ya tienes cuenta?
                  <a href="login.html" class="fw-bold">Inicia sesion</a>
                </p>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-3 bg-dark text-light small">
    &copy; UEFA Champions League
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
