<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Taller-4 - Iniciar Sesión</title>
  <meta name="description" content="Página login del taller 4 de desarrollo web con Bootstrap y toda la información sobre la UEFA Champions League" />
  <meta name="keywords" content="Taller 4 bootstrap, UEFA Champions League, UCL" />
  
  <meta name="author" content="Sebastian Monsalve" />
  <link rel="shortcut icon" href="../assets/img/champions_blanco.png" type="image/png" />
  
  <meta name="theme-color" content="#1f4ea8" />
  <meta name="MobileOptimized" content="width" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column opacity-20 " style="background-image: url(../assets/img/balloon-.jpg); background-size: cover;background-position: center; background-repeat: no-repeat;">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
         <div class="navbar-brand d-flex align-items-center m-0 p-0">
            <img
              src="../assets/img/champions_blanco.png"
              alt="Logo UCL"
              width="30"
              height="30"
              class="me-2"
            />
            <span class="fs-5 fw-bold text-light font-monospace">UCL</span>
            </div>
      <div class="d-flex gap-2">
        <a href="../index.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Volver al inicio
        </a>
      </div>
    </div>
  </nav>

  <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-6 col-lg-5 col-xl-4">

          <div class="card ">
            <div class="card-body p-4">

              <div class="text-center mb-4">
                <img src="../assets/img/Champions_negro.png" alt="UCL" style="height: 80px;" />
                <h3 class="mt-3">Iniciar Sesion</h3>
                <p class="text-muted">Accede a tu cuenta del portal UCL</p>
              </div>

              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="correo" placeholder="nombre@club.com" />
                <label for="correo"><i class="bi bi-envelope me-1"></i>Correo electronico</label>
              </div>

              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="contraseña" placeholder="Contrasena" />
                <label for="contraseña"><i class="bi bi-lock me-1"></i>Contraseña</label>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="recordarme" />
                  <label class="form-check-label" for="recordarme">Recordarme</label>
                </div>
                <a href="recuperar.html" class="text-decoration-none small">Olvide mi contraseña</a>
              </div>

              <button class="btn btn-primary w-100 btn-lg mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
              </button>

              <div class="text-center">
                <p class="small mb-0">No tienes cuenta?
                  <a href="registro.html" class="fw-bold">Registrate aqui</a>
                </p>
              </div>

            </div>
          </div>

          <div class="text-center mt-3">
            <a href="admin.html" class="btn btn-dark btn-sm me-2">
              <i class="bi bi-gear-fill me-1"></i>Panel Admin
            </a>
            <a href="cliente.html" class="btn btn-primary btn-sm">
              <i class="bi bi-person-fill me-1"></i>Club
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-3  small bg-dark text-light">
    &copy; UEFA Champions League
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
